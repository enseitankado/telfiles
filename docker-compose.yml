services:
  postgres:
    # pgvector/pgvector:pg16 = official Postgres 16 image with pgvector
    # extension pre-installed. Drop-in replacement for postgres:16-alpine;
    # the existing pgdata volume keeps working without migration.
    image: pgvector/pgvector:pg16
    container_name: telfiles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: telfiles
      POSTGRES_USER: telfiles
      POSTGRES_PASSWORD: telfiles
    ports:
      - "5434:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telfiles -d telfiles"]
      interval: 5s
      timeout: 5s
      retries: 10

  telfiles-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: telfiles-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./app/static:/app/static
      - /:/app/host
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - DOWNLOADS_DIR=/app/downloads
      - DATABASE_URL=postgresql://telfiles:telfiles@postgres/telfiles
      # Embedding model lives inside the image (baked in by the Dockerfile),
      # so HF_HOME is just consistency with the build environment.
      - HF_HOME=/app/models
